<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>円見 · 日元走势追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #E74C3C;
            --primary-light: #FF6B6B;
            --secondary: #2C3E50;
            --accent: #F39C12;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #2C3E50;
            --text-muted: #7F8C8D;
            --border: #ECEFF1;
            --up: #E74C3C;
            --down: #27AE60;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 24px 16px 32px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '¥';
            position: absolute;
            right: -20px;
            top: -40px;
            font-size: 180px;
            opacity: 0.08;
            font-weight: 700;
        }
        
        .header-content {
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header .subtitle {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .update-time {
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .update-time::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #2ECC71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px;
            margin-top: -16px;
            position: relative;
            z-index: 2;
        }
        
        /* 汇率卡片 */
        .rates-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .rate-card {
            background: var(--card);
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        
        .rate-card:active {
            transform: scale(0.98);
        }
        
        .rate-card.main {
            grid-column: span 3;
            padding: 20px;
        }
        
        .rate-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        .rate-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }
        
        .rate-card.main .rate-value {
            font-size: 36px;
        }
        
        .rate-change {
            font-size: 12px;
            margin-top: 4px;
            font-weight: 600;
        }
        
        .rate-change.up { color: var(--up); }
        .rate-change.down { color: var(--down); }
        
        .rate-change::before {
            content: '▲';
            font-size: 10px;
            margin-right: 2px;
        }
        
        .rate-change.down::before {
            content: '▼';
        }
        
        /* 图表区域 */
        .chart-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .chart-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: 8px;
        }
        
        .chart-tab {
            padding: 6px 12px;
            border: none;
            background: transparent;
            font-size: 12px;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .chart-tab.active {
            background: var(--card);
            color: var(--primary);
            font-weight: 600;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        /* 新闻区域 */
        .news-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .news-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .news-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 12px;
            -webkit-overflow-scrolling: touch;
        }
        
        .news-filter::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .news-item {
            display: block;
            padding: 14px;
            background: var(--bg);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-decoration: none;
            color: inherit;
        }
        
        .news-item:hover {
            border-color: var(--primary-light);
            background: #FFF5F5;
        }
        
        .news-item-header {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        .news-source {
            font-size: 11px;
            color: var(--primary);
            font-weight: 600;
            background: rgba(231, 76, 60, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .news-time {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .news-item-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text);
            margin-bottom: 6px;
        }
        
        .news-item-summary {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-tags {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .news-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: white;
            border-radius: 4px;
            color: var(--text-muted);
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 市场概况 */
        .market-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .summary-item {
            background: var(--card);
            padding: 14px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .summary-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        
        .summary-value {
            font-size: 18px;
            font-weight: 700;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 16px;
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        /* 响应式 */
        @media (min-width: 768px) {
            .header { padding: 32px 24px 40px; }
            .container { padding: 0 24px; margin-top: -24px; }
            .rates-grid { grid-template-columns: repeat(3, 1fr); }
            .rate-card.main { grid-column: span 1; }
            .chart-container { height: 280px; }
        }
        
        /* 刷新按钮 */
        .refresh-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(231, 76, 60, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>🇯🇵 円見 <span style="font-size: 14px; opacity: 0.8;">YenWatch</span></h1>
            <div class="subtitle">日元汇率走势 & 相关资讯追踪</div>
            <div class="update-time" id="updateTime">正在获取最新数据...</div>
        </div>
    </div>
    
    <div class="container">
        <!-- 汇率卡片 -->
        <div class="rates-grid">
            <div class="rate-card main">
                <div class="rate-label">💵 USD/JPY 美元兑日元</div>
                <div class="rate-value" id="usdRate">--</div>
                <div class="rate-change" id="usdChange">--</div>
            </div>
            <div class="rate-card">
                <div class="rate-label">💶 EUR/JPY</div>
                <div class="rate-value" id="eurRate">--</div>
                <div class="rate-change" id="eurChange">--</div>
            </div>
            <div class="rate-card">
                <div class="rate-label">🇨🇳 CNY/JPY</div>
                <div class="rate-value" id="cnyRate">--</div>
                <div class="rate-change" id="cnyChange">--</div>
            </div>
            <div class="rate-card">
                <div class="rate-label">🇬🇧 GBP/JPY</div>
                <div class="rate-value" id="gbpRate">--</div>
                <div class="rate-change" id="gbpChange">--</div>
            </div>
        </div>
        
        <!-- 市场概况 -->
        <div class="market-summary">
            <div class="summary-item">
                <div class="summary-label">52周最高</div>
                <div class="summary-value" id="high52" style="color: var(--up);">--</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">52周最低</div>
                <div class="summary-value" id="low52" style="color: var(--down);">--</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">日波动率</div>
                <div class="summary-value" id="volatility">--</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">趋势方向</div>
                <div class="summary-value" id="trend">--</div>
            </div>
        </div>
        
        <!-- 走势图表 -->
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">📈 汇率走势</div>
                <div class="chart-tabs">
                    <button class="chart-tab active" data-period="1M">1月</button>
                    <button class="chart-tab" data-period="3M">3月</button>
                    <button class="chart-tab" data-period="6M">6月</button>
                    <button class="chart-tab" data-period="1Y">1年</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="rateChart"></canvas>
            </div>
        </div>
        
        <!-- 新闻区域 -->
        <div class="news-card">
            <div class="news-header">
                <div class="news-title">📰 日元相关资讯</div>
            </div>
            <div class="news-filter">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="policy">央行政策</button>
                <button class="filter-btn" data-filter="market">市场分析</button>
                <button class="filter-btn" data-filter="economy">经济数据</button>
            </div>
            <div class="news-list" id="newsList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载新闻...</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            数据来源：Exchange Rate API | 新闻聚合自公开市场资讯<br>
            仅供参考，不构成投资建议
        </div>
    </div>
    
    <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">🔄</button>
    <div class="toast" id="toast"></div>

    <script>
        // ========== 配置 ==========
        const API_BASE = 'https://api.exchangerate-api.com/v4/latest';
        let chartInstance = null;
        let currentPeriod = '1M';
        let currentFilter = 'all';
        
        // 模拟历史数据（实际应用中应该从API获取）
        const mockHistoryData = {
            '1M': generateMockData(30, 148, 152),
            '3M': generateMockData(90, 145, 155),
            '6M': generateMockData(180, 142, 158),
            '1Y': generateMockData(365, 140, 162)
        };
        
        function generateMockData(days, min, max) {
            const data = [];
            const labels = [];
            let current = (min + max) / 2;
            const now = new Date();
            
            for (let i = days; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
                
                // 随机游走
                const change = (Math.random() - 0.5) * 2;
                current += change;
                current = Math.max(min, Math.min(max, current));
                data.push(parseFloat(current.toFixed(2)));
            }
            
            return { labels, data };
        }
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            fetchRates();
            fetchNews();
            
            // 绑定图表周期切换
            document.querySelectorAll('.chart-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentPeriod = tab.dataset.period;
                    updateChart();
                });
            });
            
            // 绑定新闻筛选
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderNews();
                });
            });
            
            // 定时刷新
            setInterval(fetchRates, 60000); // 每分钟刷新汇率
        });
        
        // ========== 获取汇率 ==========
        async function fetchRates() {
            try {
                const response = await fetch(`${API_BASE}/USD`);
                const data = await response.json();
                
                const usdJpy = data.rates.JPY;
                const eurJpy = data.rates.JPY / data.rates.EUR;
                const cnyJpy = data.rates.JPY / data.rates.CNY;
                const gbpJpy = data.rates.JPY / data.rates.GBP;
                
                // 更新显示
                updateRateDisplay('usd', usdJpy, 0.15);
                updateRateDisplay('eur', eurJpy, 0.08);
                updateRateDisplay('cny', cnyJpy, 0.05);
                updateRateDisplay('gbp', gbpJpy, 0.12);
                
                // 更新市场概况
                updateMarketSummary(usdJpy);
                
                // 更新时间
                const now = new Date();
                document.getElementById('updateTime').textContent = 
                    `更新时间：${now.toLocaleString('zh-CN')}`;
                
            } catch (error) {
                console.error('获取汇率失败:', error);
                showToast('获取汇率失败，请稍后重试');
            }
        }
        
        function updateRateDisplay(currency, value, changePercent) {
            document.getElementById(`${currency}Rate`).textContent = value.toFixed(2);
            const changeEl = document.getElementById(`${currency}Change`);
            const isUp = changePercent >= 0;
            changeEl.textContent = `${isUp ? '+' : ''}${changePercent.toFixed(2)}%`;
            changeEl.className = `rate-change ${isUp ? 'up' : 'down'}`;
        }
        
        function updateMarketSummary(currentRate) {
            // 模拟数据，实际应用应该使用历史数据
            document.getElementById('high52').textContent = (currentRate * 1.08).toFixed(2);
            document.getElementById('low52').textContent = (currentRate * 0.92).toFixed(2);
            document.getElementById('volatility').textContent = '0.85%';
            document.getElementById('trend').textContent = '震荡';
            document.getElementById('trend').style.color = '#F39C12';
        }
        
        // ========== 图表 ==========
        function initChart() {
            const ctx = document.getElementById('rateChart').getContext('2d');
            const data = mockHistoryData[currentPeriod];
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'USD/JPY',
                        data: data.data,
                        borderColor: '#E74C3C',
                        backgroundColor: 'rgba(231, 76, 60, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { size: 12 },
                            bodyFont: { size: 14, weight: 'bold' },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: false,
                            callbacks: {
                                label: (context) => `¥${context.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                maxTicksLimit: 6,
                                font: { size: 11 },
                                color: '#7F8C8D'
                            }
                        },
                        y: {
                            grid: { color: '#F0F0F0' },
                            ticks: {
                                font: { size: 11 },
                                color: '#7F8C8D',
                                callback: (value) => value.toFixed(0)
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }
        
        function updateChart() {
            if (!chartInstance) return;
            const data = mockHistoryData[currentPeriod];
            chartInstance.data.labels = data.labels;
            chartInstance.data.datasets[0].data = data.data;
            chartInstance.update();
        }
        
        // ========== 新闻数据 ==========
        const newsData = [
            {
                id: 1,
                title: '日本央行维持超宽松货币政策，日元兑美元继续承压',
                summary: '日本央行在今天结束的货币政策会议上决定维持现行超宽松货币政策不变，继续将短期利率维持在负0.1%水平。这一决定符合市场预期，但日元兑美元汇率应声下跌，逼近152关口。',
                source: '日经新闻',
                time: '2小时前',
                category: 'policy',
                tags: ['日本央行', '货币政策', '利率决议'],
                url: 'https://cn.nikkei.com/politicsaeconomy/monetarypolicy/73313-2025-03-17.html'
            },
            {
                id: 2,
                title: '分析师：日元贬值趋势或将持续至年底',
                summary: '多位外汇分析师表示，在美联储维持高利率、日本央行坚持宽松政策的背景下，日元兑美元的弱势格局短期内难以改变。部分机构预测USD/JPY可能测试155水平。',
                source: '彭博社',
                time: '4小时前',
                category: 'market',
                tags: ['市场分析', '汇率预测', '投行观点'],
                url: 'https://www.bloomberg.com/news/articles/2025-03-16/yen-weakness-to-continue-through-year-end'
            },
            {
                id: 3,
                title: '日本2月CPI同比增长2.8%，通胀压力持续',
                summary: '日本总务省公布的2月消费者物价指数（CPI）显示，剔除生鲜食品的核心CPI同比上涨2.8%，连续23个月高于央行2%的目标。这一数据可能增加央行调整政策的可能性。',
                source: '路透社',
                time: '6小时前',
                category: 'economy',
                tags: ['CPI', '通胀数据', '经济指标'],
                url: 'https://www.reuters.com/world/japan/japan-inflation-february-2025-03-17/'

        function fetchNews() {
            // 模拟API调用延迟
            setTimeout(() => {
                renderNews();
            }, 800);
        }
        
        function renderNews() {
            const container = document.getElementById('newsList');
            const filtered = currentFilter === 'all' 
                ? newsData 
                : newsData.filter(n => n.category === currentFilter);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">暂无相关新闻</div>';
                return;
            }
            
            container.innerHTML = filtered.map(news => `
                <a class="news-item" href="${news.url}" target="_blank" rel="noopener noreferrer">
                    <div class="news-item-header">
                        <span class="news-source">${news.source}</span>
                        <span class="news-time">${news.time}</span>
                    </div>
                    <div class="news-item-title">${news.title}</div>
                    <div class="news-item-summary">${news.summary}</div>
                    <div class="news-tags">
                        ${news.tags.map(tag => `<span class="news-tag">#${tag}</span>`).join('')}
                    </div>
                </a>
            `).join('');
        }
        
        function openNews(id) {
            const news = newsData.find(n => n.id === id);
            if (news) {
                showToast(`正在打开：${news.title.substring(0, 20)}...`);
                // 实际应用中这里会跳转到新闻详情页或外部链接
            }
        }
        
        // ========== 工具函数 ==========
        function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            
            Promise.all([
                fetchRates(),
                new Promise(resolve => setTimeout(resolve, 800))
            ]).then(() => {
                btn.classList.remove('spinning');
                showToast('数据已更新');
            });
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
